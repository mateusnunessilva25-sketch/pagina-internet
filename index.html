<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Motivação</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .container{
            background:rgba(0,0,0,0.4);
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:80%;
            max-width:600px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            font-size:40px;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            margin-bottom:30px;
            line-height:1.6;
        }

        button{
            padding:15px 30px;
            font-size:18px;
            border:none;
            border-radius:10px;
            background:#ffcc00;
            color:#333;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#ffaa00;
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Nunca Desista!</h1>

        <p id="mensagem">
            O sucesso é a soma de pequenos esforços repetidos todos os dias.
        </p>

        <button onclick="motivar()">
            Nova Mensagem Motivacional
        </button>
    </div>

    <script>
        const mensagens = [
            "Acredite em você e tudo será possível.",
            "Cada novo dia é uma nova oportunidade.",
            "Grandes conquistas começam com pequenos passos.",
            "O esforço de hoje é a vitória de amanhã.",
            "Nunca pare de aprender e evoluir.",
            "Seja forte, persistente e confiante.",
            "Seu futuro depende das atitudes de hoje.",
            "Você é capaz de alcançar seus sonhos."
        ];

        function motivar(){
            const indice = Math.floor(Math.random() * mensagens.length);
            document.getElementById("mensagem").innerHTML = mensagens[indice];
        }
    </script>

</body>
</html>
